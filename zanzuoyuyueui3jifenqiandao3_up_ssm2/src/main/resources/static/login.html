<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <link rel="stylesheet" type="text/css" href="__PUBLIC__/css/index.css"/>
    <script type="text/javascript" src="__PUBLIC__/js/jquery-3.4.1.min.js"></script>
    <script type="text/javascript" src="__PUBLIC__/js/json2.js"></script>
    <script type="text/javascript" src="__PUBLIC__/js/common.js"></script>
    <meta charset="UTF-8">
    <title>登录管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #f5f5f5;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
            max-width: 1200px;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
        }

        /* Left section with characters */
        .characters-section {
            flex: 1;
            background-color: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .character {
            position: absolute;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .character1 {
            width: 160px;
            height: 160px;
            background-color: #ff6b6b;
            border-radius: 50%;
            top: 250px;
            left: 80px;
        }

        .character2 {
            width: 140px;
            height: 180px;
            background-color: #4ecdc4;
            bottom: 260px;
            left: 120px;
        }

        .character3 {
            width: 120px;
            height: 120px;
            background-color: #45b7d1;
            border-radius: 50%;
            top: 260px;
            right: 100px;
        }

        .character4 {
            width: 130px;
            height: 130px;
            background-color: #96ceb4;
            border-radius: 50%;
            bottom: 120px;
            right: 80px;
        }

        /* Character faces */
        .face {
            position: relative;
            width: 100%;
            height: 100%;
            transition: all 0.5s ease;
        }

        .eyes {
            position: absolute;
            width: 100%;
            top: 40%;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .eye {
            width: 20px;
            height: 20px;
            background-color: #333;
            border-radius: 50%;
            transition: all 0.2s ease;
            position: relative;
        }

        .mouth {
            position: absolute;
            width: 40px;
            height: 20px;
            border-radius: 0 0 40px 40px;
            background-color: #333;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.3s ease;
        }

        /* Right section with form */
        .form-section {
            flex: 1;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .form-container {
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto;
            position: relative;
        }

        .logo-icon::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 3px solid #333;
            border-radius: 50%;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            background-color: #333;
            border-radius: 50%;
        }

        .title {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 10px;
            color: #333;
        }

        .subtitle {
            font-size: 14px;
            text-align: center;
            margin-bottom: 40px;
            color: #666;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .password-container {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
        }

        .remember-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .remember-me {
            display: flex;
            align-items: center;
        }

        .remember-me input {
            margin-right: 8px;
        }

        .forgot-password {
            color: #4ecdc4;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background-color: #333;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            background-color: #555;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .google-login {
            width: 100%;
            padding: 12px;
            background-color: #fff;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .google-login:hover {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.1);
        }

        .signup-link {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .signup-link a {
            color: #4ecdc4;
            text-decoration: none;
            font-weight: 500;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        @keyframes cheer {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes turnAround {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(180deg); }
        }

        .character.shake {
            animation: shake 0.5s ease-in-out;
        }

        .character.cheer {
            animation: cheer 0.5s ease-in-out infinite;
        }

        .character.turn-around .face {
            animation: turnAround 0.5s ease-in-out forwards;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .characters-section {
                height: 300px;
            }

            .form-section {
                flex: 1;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Left section with characters -->
    <div class="characters-section">
        <div class="character character1">
            <div class="face">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>
        <div class="character character2">
            <div class="face">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>
        <div class="character character3">
            <div class="face">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>
        <div class="character character4">
            <div class="face">
                <div class="eyes">
                    <div class="eye"></div>
                    <div class="eye"></div>
                </div>
                <div class="mouth"></div>
            </div>
        </div>
    </div>

    <!-- Right section with form -->
    <div class="form-section">
        <div class="form-container">
            <div class="logo">
                <div class="logo-icon"></div>
            </div>
            <h1 class="title">登录后台管理系统</h1>
            <p class="subtitle">输入用户名密码登录系统</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="password-container">
                        <input type="password" id="passwd" class="form-input" placeholder="请输入密码" required>
                        <span class="password-toggle" onclick="togglePassword()">👁️</span>
                    </div>
                </div>
                <div class="remember-container">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">记住我</label>
                    </div>
                    <!--<a href="#" class="forgot-password">Forgot password?</a>-->
                </div>
                <button type="button" class="login-btn" onclick="login()">登录</button>
                <!--<button type="button" class="google-login">
                    <span>🔵</span>
                    Log in with Google
                </button>
                <div class="signup-link">
                    Don't have an account? <a href="#">Sign Up</a>
                </div>-->
            </form>
        </div>
    </div>
</div>

<script>
    // Character eye tracking
    document.addEventListener('mousemove', function(e) {
        const characters = document.querySelectorAll('.character');
        
        characters.forEach(character => {
            const rect = character.getBoundingClientRect();
            const characterX = rect.left + rect.width / 2;
            const characterY = rect.top + rect.height / 2;
            
            const deltaX = e.clientX - characterX;
            const deltaY = e.clientY - characterY;
            
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            const maxDistance = 100;
            const ratio = Math.min(distance / maxDistance, 1);
            
            const eyes = character.querySelectorAll('.eye');
            eyes.forEach(eye => {
                const eyeX = (deltaX / maxDistance) * 10 * ratio;
                const eyeY = (deltaY / maxDistance) * 10 * ratio;
                eye.style.transform = `translate(${eyeX}px, ${eyeY}px)`;
            });
        });
    });

    // Password toggle
    function togglePassword() {
        const passwordInput = document.getElementById('passwd');
        const passwordToggle = document.querySelector('.password-toggle');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            passwordToggle.textContent = '👁️‍🗨️';
        } else {
            passwordInput.type = 'password';
            passwordToggle.textContent = '👁️';
        }
    }

    // Password input focus event
    document.getElementById('passwd').addEventListener('focus', function() {
        const characters = document.querySelectorAll('.character');
        characters.forEach(character => {
            character.classList.add('turn-around');
        });
    });

    // Password input blur event
    document.getElementById('passwd').addEventListener('blur', function() {
        const characters = document.querySelectorAll('.character');
        characters.forEach(character => {
            character.classList.remove('turn-around');
        });
    });

    // Login function
    function login() {
        var username = document.getElementById('username').value;
        var passwd = document.getElementById('passwd').value;
        
        if (username.trim() === '' || passwd.trim() === '') {
            alert('请输入用户名和密码！');
            return;
        }

        // Show loading state
        const loginBtn = document.querySelector('.login-btn');
        const originalText = loginBtn.textContent;
        loginBtn.textContent = '登录中...';
        loginBtn.disabled = true;

        ajaxCallback1("find", {table:"user",username:username,passwd:passwd}, function(data) {
            // Restore button state
            loginBtn.textContent = originalText;
            loginBtn.disabled = false;

            if (!data) {
                // Login failed - characters shake
                alert("用户名或密码错误!");
                const characters = document.querySelectorAll('.character');
                characters.forEach(character => {
                    character.classList.add('shake');
                    setTimeout(() => {
                        character.classList.remove('shake');
                    }, 500);
                });
            } else {
                // Login success - characters cheer
                alert("登陆成功!");
                const characters = document.querySelectorAll('.character');
                characters.forEach(character => {
                    character.classList.add('cheer');
                });

                // Store user info
                var userinfostr = JSON.stringify(data);
                localStorage['adminuserinfo'] = userinfostr;

                // Redirect after a short delay to show animation
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1000);
            }
        });
    }

    // Remember me functionality
    $(function () {
        document.onkeydown=function (e){
            e = e ? e : event;
            if(e.keyCode == 13){
                login();
            }
        }
    });

    if(top.location!=self.location) top.location=self.location;

    var loginuserinfo = localStorage["loginuserinfo"];
    var isremember = localStorage['isremember'];

    if(loginuserinfo){
        var info = JSON.parse(loginuserinfo);
        document.getElementById("passwd").value = info.passwd;
        document.getElementById("username").value = info.username;
    }

    if(isremember=="1"){
        document.getElementById("remember").checked = true;
    }
</script>
</body>
</html>
